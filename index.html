<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="top">
    <p>Component</p>
    <h1>Tables</h1>
</div>
<div class="middle">
    <div class="mLeft">
    <p style="text-decoration: none;">Selection:</p>
    <p style="color: rgb(29, 29, 184); font-weight: 700; cursor: pointer;">Add tags</p>
    <p style="color: red; font-weight: 700; cursor: pointer;">Remove</p>
    </div>
    <div class="mRight">
        <input type="search" name="" id="">
        <button>Customize cols</button>
        <button>Export</button>
    </div>
</div>
      <table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Title</th>
      <th>Email</th>
      <th>Role</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody class="tbody">
  </tbody>
</table>
</div>    

   <div class="creatmodal">
        <div class="crmodal">
            <div class="crmodaltop"><h1>Создать карточку</h1></div>
           <form class="CreatForm">
            <div class="st1">
                <input type="hidden" name="id" id="" class="id">
                <p>ФИО</p>
                <input type="text" name="name" id="" placeholder="Введите название..."  style="margin-left: 20px; width: 350px; height: 40px; border-radius: 20px; padding-left: 10px;">
            </div>
            <div class="st2">
                <p>Направление</p>
               <input type="text" name="title" id="" placeholder="Введите направление..."  style="margin-left: 20px; width: 350px; height: 40px; border-radius: 20px; padding-left: 10px;">
            </div>
             <div class="st3">
                <p>Почта</p>
               <input type="text" name="email" id="" placeholder="Введите почту..."  style="margin-left: 20px; width: 350px; height: 40px; border-radius: 20px; padding-left: 10px;">
            </div>
           <div class="st4">
            <p>Категория</p>
            <select name="role" id=""  style="width: 370px; margin-left: 20px; border: 0; height: 40px; cursor: pointer;" class="status"> 
            <option value="Admin" >Admin</option>
            <option value="Header">Header</option>
            <option value="Boss">Boss</option>
            <option value="Leader">Leader</option>
            <option value="Barmen">Barmen</option>
          </select>
            </div>
            <div class="closesave">
                <button class="Closeml" type="button">Закрыть</button>
                <button class="Creat">Создать</button>
            </div>
            </form>
    </div>
    </div>





    <script src="main.js"></script>
</body>
</html>
